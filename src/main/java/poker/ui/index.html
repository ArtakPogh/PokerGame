<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="table">

    <div id="turnIndicator">Your Turn</div>

    <div class="community-cards" id="communityCards"></div>

    <div class="pot" id="pot"></div>

    <div class="player-section">

        <div class="label">Your Hand</div>

        <div class="cards"></div>

        <div id="timer">15</div>

        <div class="actions">
            <button id="foldBtn" class="fold">Fold</button>
            <button id="checkBtn" class="check">Check</button>
            <button id="callBtn" class="call">Call</button>
            <button id="raiseBtn" class="raise">Raise</button>
        </div>

        <div id="raisePanel" class="raise-panel hidden">

            <input
                    type="range"
                    id="raiseSlider"
                    min="50"
                    max="1000"
                    value="50"
            >

            <div class="raise-info">
                Raise Amount:
                <span id="raiseValue">50</span>
            </div>

            <button id="confirmRaise">
                Confirm Raise
            </button>

        </div>

    </div>

</div>

<script src="logic.js"></script>

</body>
</html>
