<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="overlay">
    <div class="overlay-box">
        <div class="overlay-title">🃏 Texas Hold'em</div>
        <p class="overlay-sub">Enter your name and press Start to find a table.</p>
        <input id="playerNameInput" type="text" placeholder="Your name" maxlength="20"/>
        <button id="startBtn" class="btn-primary">Start Game</button>
    </div>
</div>


<div id="waitingScreen" class="overlay hidden">
    <div class="overlay-box">
        <div class="overlay-title">⏳ Waiting for Players</div>
        <p class="overlay-sub" id="waitingMsg">You're at the table. Waiting for another player to join...</p>
        <div class="spinner"></div>
    </div>
</div>


<div id="eliminatedScreen" class="overlay hidden">
    <div class="overlay-box">
        <div class="overlay-title">💀 Eliminated</div>
        <p class="overlay-sub">You ran out of chips. Better luck next time!</p>
        <button id="playAgainBtn" class="btn-primary">Play Again</button>
    </div>
</div>


<div id="sessionOverScreen" class="overlay hidden">
    <div class="overlay-box">
        <div class="overlay-title">🏆 Game Over</div>
        <p class="overlay-sub" id="winnerMsg">A winner has been declared!</p>
        <button id="newGameBtn" class="btn-primary">New Game</button>
    </div>
</div>

<div id="tableWrapper" class="hidden">
    <div class="table">

        <div id="turnIndicator">...</div>

        <div class="community-cards" id="communityCards"></div>

        <div class="pot" id="pot">Pot: $0</div>

        <div id="phaseLabel" class="phase-label"></div>

        <div id="playersContainer"></div>

        <div class="player-section">
            <div class="label">Your Hand</div>
            <div class="cards" id="playerCards"></div>

            <div id="timer"></div>

            <div class="actions">
                <button id="foldBtn" class="fold" disabled>Fold</button>
                <button id="checkBtn" class="check" disabled>Check</button>
                <button id="callBtn" class="call" disabled>Call</button>
                <button id="raiseBtn" class="raise" disabled>Raise</button>
            </div>

            <div id="raisePanel" class="raise-panel hidden">
                <input type="range" id="raiseSlider" min="50" max="1000" value="50">
                <div class="raise-info">
                    Raise Amount: <span id="raiseValue">50</span>
                </div>
                <button id="confirmRaise">Confirm Raise</button>
            </div>
        </div>

    </div>
</div>

<script src="logic.js"></script>
</body>
</html>
